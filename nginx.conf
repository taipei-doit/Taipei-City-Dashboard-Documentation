server {
    listen 8082;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location = / {
        return 301 /documentation/;
    }

    location /documentation/ {
        try_files $uri $uri/ /documentation/index.html;
    }

    location ~* ^/documentation/.+\.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        access_log off;
        try_files $uri =404;
    }
}
